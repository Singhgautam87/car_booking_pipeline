services:

  # ── JENKINS ────────────────────────────────────────────────────
  jenkins:
    build: ./jenkins
    container_name: jenkins
    restart: unless-stopped
    user: root
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
      - MYSQL_PWD=${MYSQL_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - car-booking-network

  # ── ZOOKEEPER ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_HEAP_OPTS: "-Xmx128M -Xms128M"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' && echo imok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - car-booking-network

  # ── KAFKA ──────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms128M"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - car-booking-network

  # ── SCHEMA REGISTRY ────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xmx128M -Xms128M"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - car-booking-network

  # ── KAFKA UI ───────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - car-booking-network

  # ── SPARK ──────────────────────────────────────────────────────
  # mem_limit 2g — sequential transforms mein ek waqt 1 job
  # 512m driver + 256m executor + overhead = ~1g comfortable fit
  spark:
    image: apache/spark:3.4.2
    container_name: spark-master
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    ports:
      - "8082:8080"
      - "7077:7077"
      - "4040:4040"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./reports:/opt/reports
      - ./config:/opt/config
      - ./spark/lib:/opt/spark-apps/lib
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - car-booking-network

  # ── SPARK WORKER ───────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.4.2
    container_name: spark-worker
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    depends_on:
      spark:
        condition: service_healthy
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=768m
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./spark/lib:/opt/spark-apps/lib
      - ./config:/opt/config
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - car-booking-network

  # ── MINIO ──────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - car-booking-network

  # ── POSTGRESQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booking"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - car-booking-network

  # ── MYSQL ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "admin", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - car-booking-network

  # ── GREAT EXPECTATIONS ─────────────────────────────────────────
  great_expectations:
    build: ./great_expectations
    container_name: great_expectations
    restart: "no"
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./great_expectations:/ge
      - ./reports:/opt/reports
      - ./spark/lib:/opt/spark/lib
      - ./config:/opt/config
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    command: tail -f /dev/null
    healthcheck:
      test: ["CMD", "python", "-c", "import great_expectations"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - car-booking-network

  # ── MLFLOW ─────────────────────────────────────────────────────
  # Spark khatam hone ke baad chalta hai — memory free hoti hai
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/2.0/mlflow/experiments/list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - car-booking-network

  # ── DASHBOARD ──────────────────────────────────────────────────
  # Claude API = network call, no local compute
  # 512m dashboard mein comfortably fit ✅
  dashboard:
    build:
      context: ./realtime_dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "8050:8050"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./config:/opt/config
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - car-booking-network

networks:
  car-booking-network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  minio_data:
  mlflow_data:
  jenkins_home: